<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Poster Gallery</title>

<style>
body {
    background: #111;
    color: white;
    font-family: sans-serif;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    padding: 10px;
}

.item {
    background: #222;
    padding: 5px;
    border-radius: 8px;
}

img {
    width: 100%;
    height: auto;
    border-radius: 6px;
}
</style>

</head>

<body>

<h1>Poster Gallery</h1>

<div class="grid">

<script>
const base = "https://hal6641.github.io/images/poster/";

for (let i = 0; i < 10; i++) {
    const num = String(i).padStart(2, '0');
    const url = `${base}pos_${num}.jpg`;

    document.write(`
        <div class="item">
            <img src="${url}" loading="lazy">
            <div>pos_${num}.jpg</div>
        </div>
    `);
}
</script>

</div>

</body>
</html>
