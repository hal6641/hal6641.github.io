<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Poster Preview</title>

<style>
body {
    background: #111;
    color: white;
    font-family: sans-serif;
}

.section {
    margin: 20px 0;
    padding: 10px;
    border-top: 1px solid #444;
}

.section-title {
    font-size: 18px;
    margin-bottom: 10px;
    color: #aaa;
}

.poster {
    width: 140px;
    margin: 5px;
    border: 1px solid #333;
}
</style>

</head>
<body>

<h1>Poster Layout Preview</h1>

<div id="container"></div>

<script>

const settingURL =
"https://raw.githubusercontent.com/hal6641/hal6641.github.io/main/images/poster/posterSetting.txt";

const baseImage =
"https://hal6641.github.io/images/poster/";

fetch(settingURL)
.then(res => res.text())
.then(text => {

    const lines = text.split(/\r?\n/);

    const container = document.getElementById("container");

    let currentSection = null;
    let sectionDiv = null;

    for (let line of lines) {

        if (!line.includes("=")) continue;

        // コメント削除
        line = line.split("//")[0].trim();
        if (!line) continue;

        const [key, value] = line.split("=");
        if (!value) continue;

        const index = parseInt(value);
        if (isNaN(index)) continue;

        // セクション判定（POS_JOIN / POS_LOBBY / POS_2F）
        let sectionName = "OTHER";

        if (key.includes("JOIN")) sectionName = "JOIN";
        else if (key.includes("LOBBY")) sectionName = "LOBBY";
        else if (key.includes("2F")) sectionName = "2F";

        // セクションが変わったら新しい箱作る
        if (sectionName !== currentSection) {

            currentSection = sectionName;

            sectionDiv = document.createElement("div");
            sectionDiv.className = "section";

            const title = document.createElement("div");
            title.className = "section-title";
            title.textContent = sectionName;

            sectionDiv.appendChild(title);
            container.appendChild(sectionDiv);
        }

        // 画像生成
        const img = document.createElement("img");
        img.className = "poster";

        const num = String(index).padStart(2, "0");
        img.src = baseImage + "pos_" + num + ".jpg";

        sectionDiv.appendChild(img);
    }

});

</script>


    
<h1>Poster Gallery</h1>
<div class="grid">
<script>
const base = "https://hal6641.github.io/images/poster/";

for (let i = 0; i < 10; i++) {
    const num = String(i).padStart(2, '0');
    const url = `${base}pos_${num}.jpg`;

    document.write(`
        <div class="item">
            <img src="${url}" loading="lazy">
            <div>pos_${num}.jpg</div>
        </div>
    `);
}
</script>
</div>

    
</body>
</html>
