<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Poster Layout Preview</title>

<style>
body {
    background: #111;
    color: white;
    font-family: sans-serif;
}

.world {
    position: relative;
    width: 800px;
    height: 500px;
    background: #222;
    margin: 10px;
    overflow: hidden;
}

.poster {
    position: absolute;
    width: 120px;
    transform-origin: center;
    border: 1px solid #555;
}
</style>

</head>
<body>

<h2>Poster Layout Preview</h2>

<div class="world" id="world"></div>

<script>

const baseImage = "https://hal6641.github.io/images/poster/";
const settingURL =
"https://raw.githubusercontent.com/hal6641/hal6641.github.io/refs/heads/main/images/poster/posterSetting.txt";

fetch(settingURL)
.then(res => res.text())
.then(text => {

    const lines = text.split(/\r?\n/);
    const world = document.getElementById("world");

    for (let line of lines) {

        if (!line.includes("=")) continue;

        const [name, value] = line.split("=");

        const parts = value.split(",");

        if (parts.length < 2) continue;

        const index = parseInt(parts[0]);
        const x = parseFloat(parts[1]);
        const y = parseFloat(parts[2] || 0);
        const rot = parseFloat(parts[3] || 0);

        const img = document.createElement("img");
        img.className = "poster";

        const num = String(index).padStart(2, "0");
        img.src = baseImage + "pos_" + num + ".jpg";

        img.style.left = (400 + x * 50) + "px";
        img.style.top = (250 - y * 50) + "px";
        img.style.transform = `rotate(${rot}deg)`;

        world.appendChild(img);
    }

});

</script>

</body>
</html>
